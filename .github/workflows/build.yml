name: Build Desktop Application

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install System Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++6

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r backend/requirements.txt

    - name: Compile Python Backend (PyInstaller)
      run: |
        pyinstaller --onedir --noconfirm --name autoscore-backend backend/cli.py

    - name: Build Flutter Desktop App
      run: |
        cd frontend
        # Run flutter pub get and build the desktop target
        flutter pub get
        if [ "${{ matrix.os }}" = "macos-latest" ]; then
          flutter build macos --release
        elif [ "${{ matrix.os }}" = "windows-latest" ]; then
          flutter build windows --release
        else
          flutter build linux --release
        fi
      shell: bash

    - name: Package Release
      run: |
        mkdir -p dist
        if [ "${{ matrix.os }}" = "macos-latest" ]; then
          zip -r dist/autoscoreNidra-macOS.zip frontend/build/macos/Build/Products/Release/autoscoreNidra.app
        elif [ "${{ matrix.os }}" = "windows-latest" ]; then
          compress-archive -path frontend/build/windows/runner/Release/* -destinationpath dist/autoscoreNidra-Windows.zip
        else
          tar -czvf dist/autoscoreNidra-Linux.tar.gz -C frontend/build/linux/x64/release/bundle .
        fi
      shell: bash

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: autoscoreNidra-${{ matrix.os }}
        path: dist/*
